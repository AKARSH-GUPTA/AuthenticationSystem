<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login Page</title>
  <style>
     * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    .container{
      background: #f6f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .card {
      width: 440px;
      background: #ffffff;
      padding: 40px 30px;
      border-radius: 12px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      font-size: 24px;
      margin-bottom: 8px;
    }
     /* Icon box */
    .icon-box {
      width: 70px;
      height: 70px;
      background: #eef2ff;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
    }

    .icon-box span {
      font-size: 28px;
      color: #4a6cf7;
    }

    h1 {
      font-size: 28px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #111;
    }


    .subtitle {
      font-size: 14px;
      color: #777;
      margin-bottom: 20px;
    }

    .social-buttons {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .social-buttons button {
      flex: 1;
      padding: 10px;
      border: 1px solid #ddd;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .divider {
      margin: 15px 0;
      font-size: 12px;
      color: #aaa;
      position: relative;
    }

    .divider::before,
    .divider::after {
      content: "";
      position: absolute;
      width: 40%;
      height: 1px;
      background: #ddd;
      top: 50%;
    }

    .divider::before {
      left: 0;
    }

    .divider::after {
      right: 0;
    }

    .input-group {
      text-align: left;
      margin-bottom: 15px;
    }

    .input-group label {
      font-size: 12px;
      color: #555;
      display: block;
      margin-bottom: 5px;
    }

    .input-group input {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
    }

    .forgot {
      float: right;
      font-size: 12px;
      color: #6a5acd;
      text-decoration: none;
    }

    .login-btn {
      width: 100%;
      padding: 12px;
      background: #4a6cf7;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      margin-top: 10px;
      cursor: pointer;
    }

    .signup {
      margin-top: 15px;
      font-size: 13px;
      color: #555;
    }

    .signup a {
      color: #4a6cf7;
      text-decoration: none;
      font-weight: bold;
    }
     /* Main button */
    .dashboard-btn {
      display: block;
      width: 100%;
      padding: 14px;
      background: linear-gradient(90deg, #4a6cf7, #3b5edb);
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 20px;
      transition: 0.3s;
    }

    .dashboard-btn:hover {
      opacity: 0.9;
    }

    /* Secondary link */
    .secondary-link {
      font-size: 14px;
      color: #4a6cf7;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 25px;
    }

    /* Footer text */
    .footer {
      font-size: 12px;
      color: #aaa;
      display: flex;
      justify-content: center;
      gap: 20px;
    }
  </style>
</head>
<body>
  <div id="root"></div>
   <script type="module" src="./src/main.jsx"></script>
</body>
</html>
